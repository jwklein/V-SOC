---
# deployment/ansible/playbooks/enroll_win2k8_agent.yml
#
# Enrolls the Metasploitable3 Win2k8 victim's Wazuh agent. The target IP is the
# result of the dnsmasq lease lookup — no hardcoded victim IP.
#
# The Rapid7 prebuilt image has SSH enabled, so execution is just two inline
# commands over SSH: msiexec (agent MSI is baked into the image) + net start.
#
# Usage — export the victim's (Terraform-pinned) MAC, then run:
#   export MAC='08:00:27:aa:bb:cc'
#   ansible-playbook playbooks/enroll_win2k8_agent.yml

# ── 1. Resolve the victim IP from its DHCP lease ─────────────────────
# Runs the lookup playbook, which sets `matched_ip` on localhost from $MAC.
- import_playbook: resolve_lease.yml

# ── 2. Register the victim at the resolved IP (over SSH) ──────────────
- name: Register Win2k8 victim
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Add victim to inventory with SSH connection vars
      ansible.builtin.add_host:
        name: win2k8_victim
        groups: victims
        ansible_host: "{{ matched_ip }}"     # from the lease lookup above
        ansible_connection: ssh
        ansible_user: vagrant                # Metasploitable3 default creds
        ansible_password: vagrant            # needs sshpass on the controller
        # Ephemeral victims are re-cloned each deploy, so host keys change —
        # don't fail on the changed/unknown key.
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

# ── 3. Enroll the agent — two inline commands over SSH ───────────────
- name: Enroll Wazuh agent on Win2k8 victim
  hosts: victims
  gather_facts: false
  vars:
    wazuh_manager_ip: "{{ manager_ip }}"                       # match your vars file
    wazuh_msi_path: 'C:\vagrant\wazuh-agent-4.14.6-1.msi'      # baked-in path — adjust
  tasks:
    - name: Install the agent silently, pointed at the manager
      ansible.builtin.raw: msiexec.exe /i {{ wazuh_msi_path }} /q WAZUH_MANAGER={{ wazuh_manager_ip }}

    - name: Start the Wazuh service
      ansible.builtin.raw: net start WazuhSvc